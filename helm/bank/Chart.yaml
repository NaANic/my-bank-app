apiVersion: v2
name: bank
description: Umbrella Helm chart for the "Bank" microservices application (Sprint 11, Kafka notifications)
type: application
version: 0.1.0
appVersion: "0.0.1"

# Subcharts live under charts/ and are added one per step.
# Each is declared here with a `condition` so it can be toggled from the
# umbrella values.yaml; this also lets you deploy everything at once via the
# umbrella, or a single component directly via its subchart directory.
dependencies:
  - name: postgres
    version: 0.1.0
    repository: "file://charts/postgres"
    condition: postgres.enabled
  - name: accounts
    version: 0.1.0
    repository: "file://charts/accounts"
    condition: accounts.enabled
  - name: notifications
    version: 0.1.0
    repository: "file://charts/notifications"
    condition: notifications.enabled
  - name: cash
    version: 0.1.0
    repository: "file://charts/cash"
    condition: cash.enabled
  - name: transfer
    version: 0.1.0
    repository: "file://charts/transfer"
    condition: transfer.enabled
  - name: gateway
    version: 0.1.0
    repository: "file://charts/gateway"
    condition: gateway.enabled
  - name: kafka
    version: 0.1.0
    repository: "file://charts/kafka"
    condition: kafka.enabled
  - name: zipkin
    version: 0.1.0
    repository: "file://charts/zipkin"
    condition: zipkin.enabled
  - name: front-ui
    version: 0.1.0
    repository: "file://charts/front-ui"
    condition: front-ui.enabled
  - name: prometheus
    version: 0.1.0
    repository: "file://charts/prometheus"
    condition: prometheus.enabled
  - name: grafana
    version: 0.1.0
    repository: "file://charts/grafana"
    condition: grafana.enabled
  - name: elasticsearch
    version: 0.1.0
    repository: "file://charts/elasticsearch"
    condition: elasticsearch.enabled
  - name: logstash
    version: 0.1.0
    repository: "file://charts/logstash"
    condition: logstash.enabled
  - name: kibana
    version: 0.1.0
    repository: "file://charts/kibana"
    condition: kibana.enabled

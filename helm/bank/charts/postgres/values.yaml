# Defaults used when this subchart is installed on its own.
# When deployed via the umbrella, global.* is supplied by the umbrella values.yaml.
global:
  image:
    registry: ""
    pullPolicy: IfNotPresent
  postgres:
    host: postgres
    port: 5432
    database: bank
    username: bank

image:
  repository: postgres
  tag: "16"

# Password for the bank DB user. Matches the Sprint 9 default.
# Stored in a Secret, never in a ConfigMap.
auth:
  password: bank

persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""   # "" = use the cluster's default StorageClass

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

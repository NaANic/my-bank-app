apiVersion: v1
kind: ConfigMap
metadata:
  name: notifications
  labels:
    {{- include "notifications.labels" . | nindent 4 }}
data:
  PG_HOST: {{ .Values.global.postgres.host | quote }}
  PG_PORT: {{ .Values.global.postgres.port | quote }}
  PG_DB: {{ .Values.global.postgres.database | quote }}
  PG_USER: {{ .Values.global.postgres.username | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.global.kafka.bootstrapServers | quote }}
  BANK_NOTIFICATIONS_TOPIC: {{ .Values.global.kafka.notificationsTopic | quote }}

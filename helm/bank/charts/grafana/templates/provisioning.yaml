apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: dashboards
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: {{ .Values.prometheusUrl }}
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: bank
        orgId: 1
        folder: Bank
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

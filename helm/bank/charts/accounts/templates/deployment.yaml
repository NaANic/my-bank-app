apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
  labels:
    {{- include "accounts.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "accounts.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "accounts.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "waiting for {{ .Values.global.postgres.host }}:{{ .Values.global.postgres.port }} ..."
              until nc -z {{ .Values.global.postgres.host }} {{ .Values.global.postgres.port }}; do
                sleep 2
              done
              echo "postgres is reachable"
      containers:
        - name: accounts
          image: {{ include "accounts.image" . | quote }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: accounts
            - secretRef:
                name: accounts
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresSecretName | quote }}
                  key: POSTGRES_PASSWORD
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

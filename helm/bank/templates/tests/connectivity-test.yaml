apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-connectivity-test"
  labels:
    app.kubernetes.io/part-of: bank
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: connectivity
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -e
          {{- if .Values.postgres.enabled }}
          echo "checking postgres:5432 (tcp)"; nc -z -w 5 postgres 5432
          {{- end }}
          {{- if .Values.kafka.enabled }}
          echo "checking kafka:9092 (tcp)"; nc -z -w 5 kafka 9092
          {{- end }}
          {{- if .Values.accounts.enabled }}
          echo "checking accounts health"; wget -q -O - http://accounts:8081/actuator/health | grep -q '"status":"UP"'
          {{- end }}
          {{- if .Values.notifications.enabled }}
          echo "checking notifications health"; wget -q -O - http://notifications:8085/actuator/health | grep -q '"status":"UP"'
          {{- end }}
          {{- if .Values.cash.enabled }}
          echo "checking cash health"; wget -q -O - http://cash:8083/actuator/health | grep -q '"status":"UP"'
          {{- end }}
          {{- if .Values.transfer.enabled }}
          echo "checking transfer health"; wget -q -O - http://transfer:8084/actuator/health | grep -q '"status":"UP"'
          {{- end }}
          {{- if .Values.gateway.enabled }}
          echo "checking gateway health"; wget -q -O - http://gateway:8080/actuator/health | grep -q '"status":"UP"'
          {{- end }}
          {{- if index .Values "front-ui" "enabled" }}
          echo "checking front-ui health"; wget -q -O - http://front-ui:8082/actuator/health | grep -q '"status":"UP"'
          {{- end }}
          {{- if .Values.zipkin.enabled }}
          echo "checking zipkin"; wget -q -O - http://zipkin:9411/health | grep -q '"status":"UP"'
          {{- end }}
          {{- if .Values.prometheus.enabled }}
          echo "checking prometheus"; wget -q -O - http://prometheus:9090/-/ready | grep -qi ready
          {{- end }}
          {{- if .Values.grafana.enabled }}
          echo "checking grafana"; wget -q -O - http://grafana:3000/api/health | grep -q '"database"'
          {{- end }}
          {{- if .Values.elasticsearch.enabled }}
          echo "checking elasticsearch"; wget -q -O - http://elasticsearch:9200/_cluster/health | grep -qE '"status":"(green|yellow)"'
          {{- end }}
          {{- if .Values.logstash.enabled }}
          echo "checking logstash:5000 (tcp)"; nc -z -w 5 logstash 5000
          {{- end }}
          {{- if .Values.kibana.enabled }}
          echo "checking kibana"; wget -q -O - http://kibana:5601/api/status | grep -q '"level":"available"'
          {{- end }}
          echo "all enabled components are reachable"

apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-connectivity-test"
  labels:
    app.kubernetes.io/part-of: bank
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: connectivity
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          set -e
          {{- if .Values.postgres.enabled }}
          echo "checking postgres:5432"; nc -z -w 5 postgres 5432
          {{- end }}
          {{- if .Values.accounts.enabled }}
          echo "checking accounts:8081"; nc -z -w 5 accounts 8081
          {{- end }}
          {{- if .Values.notifications.enabled }}
          echo "checking notifications:8085"; nc -z -w 5 notifications 8085
          {{- end }}
          {{- if .Values.cash.enabled }}
          echo "checking cash:8083"; nc -z -w 5 cash 8083
          {{- end }}
          {{- if .Values.transfer.enabled }}
          echo "checking transfer:8084"; nc -z -w 5 transfer 8084
          {{- end }}
          {{- if .Values.gateway.enabled }}
          echo "checking gateway:8080"; nc -z -w 5 gateway 8080
          {{- end }}
          echo "all enabled services are reachable"

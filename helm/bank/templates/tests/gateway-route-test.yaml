{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-gateway-route-test"
  labels:
    app.kubernetes.io/part-of: bank
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: gateway-route
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - |
          set -e
          for svc in accounts cash transfer; do
            url="http://gateway:8080/$svc/actuator/health"
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo 000)
            echo "GET $url -> $code"
            if [ "$code" != "200" ]; then
              echo "route /$svc/** did not reach a healthy backend"; exit 1
            fi
          done
          echo "all gateway routes reach healthy backends"
{{- end }}

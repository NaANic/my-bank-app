{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-gateway-route-test"
  labels:
    app.kubernetes.io/part-of: bank
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: gateway-route
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://gateway:8080/accounts/me || echo 000)
          echo "GET http://gateway:8080/accounts/me -> $code"
          case "$code" in
            5*|000) echo "gateway could not reach a backend"; exit 1 ;;
            *) echo "gateway routing works (status $code)"; exit 0 ;;
          esac
{{- end }}

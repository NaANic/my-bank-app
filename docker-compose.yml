services:
  postgres:
    image: postgres:16
    container_name: bank-postgres
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
      POSTGRES_DB: bank
    ports:
      - "5432:5432"
    volumes:
      - bank-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: bank-keycloak
    command: ["start-dev", "--import-realm", "--http-port=8090"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8090"
      - "9000:9000"
    volumes:
      - ./infra/keycloak/import:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3; grep -q 'status.*UP' <&3"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  kafka:
    image: apache/kafka:3.9.0
    container_name: bank-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: bank-kafka-cluster-01
    ports:
      - "9094:9094"
    volumes:
      - bank-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 25s

  accounts:
    build:
      context: .
      dockerfile: services/accounts/Dockerfile
    container_name: bank-accounts
    environment:
      PG_HOST: postgres
      NOTIFICATIONS_BASE_URL: http://notifications:8085
      OAUTH_ISSUER_URI: http://localhost:8090/realms/bank
      OAUTH_JWK_SET_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/certs
      OAUTH_TOKEN_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/token
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    ports:
      - "8081:8081"

  cash:
    build:
      context: .
      dockerfile: services/cash/Dockerfile
    container_name: bank-cash
    environment:
      ACCOUNTS_BASE_URL: http://accounts:8081
      NOTIFICATIONS_BASE_URL: http://notifications:8085
      OAUTH_ISSUER_URI: http://localhost:8090/realms/bank
      OAUTH_JWK_SET_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/certs
      OAUTH_TOKEN_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/token
    depends_on:
      keycloak: { condition: service_healthy }
      accounts: { condition: service_started }
    ports:
      - "8083:8083"

  transfer:
    build:
      context: .
      dockerfile: services/transfer/Dockerfile
    container_name: bank-transfer
    environment:
      ACCOUNTS_BASE_URL: http://accounts:8081
      NOTIFICATIONS_BASE_URL: http://notifications:8085
      OAUTH_ISSUER_URI: http://localhost:8090/realms/bank
      OAUTH_JWK_SET_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/certs
      OAUTH_TOKEN_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/token
    depends_on:
      keycloak: { condition: service_healthy }
      accounts: { condition: service_started }
    ports:
      - "8084:8084"

  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    container_name: bank-notifications
    environment:
      PG_HOST: postgres
      OAUTH_ISSUER_URI: http://localhost:8090/realms/bank
      OAUTH_JWK_SET_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/certs
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    ports:
      - "8085:8085"

  gateway:
    build:
      context: .
      dockerfile: infra/gateway/Dockerfile
    container_name: bank-gateway
    environment:
      ACCOUNTS_URI: http://accounts:8081
      CASH_URI: http://cash:8083
      TRANSFER_URI: http://transfer:8084
    depends_on:
      accounts: { condition: service_started }
      cash: { condition: service_started }
      transfer: { condition: service_started }
    ports:
      - "8080:8080"

  front-ui:
    build:
      context: .
      dockerfile: services/front-ui/Dockerfile
    container_name: bank-front-ui
    environment:
      OAUTH_AUTHORIZATION_URI: http://localhost:8090/realms/bank/protocol/openid-connect/auth
      OAUTH_TOKEN_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/token
      OAUTH_JWK_SET_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/certs
      OAUTH_USERINFO_URI: http://keycloak:8090/realms/bank/protocol/openid-connect/userinfo
      GATEWAY_URL: http://gateway:8080
    depends_on:
      keycloak: { condition: service_healthy }
      gateway: { condition: service_started }
    ports:
      - "8082:8082"

volumes:
  bank-postgres-data:
  bank-kafka-data:

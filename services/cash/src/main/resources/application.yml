spring:
  application:
    name: cash

  security:
    oauth2:
      client:
        registration:
          accounts-service:
            client-id: ${OAUTH_CLIENT_ID:cash}
            client-secret: ${OAUTH_CLIENT_SECRET:cash-service-secret}
            authorization-grant-type: client_credentials
            scope: bank:service
            provider: keycloak
        provider:
          keycloak:
            token-uri: ${OAUTH_TOKEN_URI:http://localhost:8090/realms/bank/protocol/openid-connect/token}
            jwk-set-uri: ${OAUTH_JWK_SET_URI:http://localhost:8090/realms/bank/protocol/openid-connect/certs}
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI:http://localhost:8090/realms/bank}
          jwk-set-uri: ${OAUTH_JWK_SET_URI:http://localhost:8090/realms/bank/protocol/openid-connect/certs}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true

server:
  port: 8083

bank:
  accounts-base-url: ${ACCOUNTS_BASE_URL:http://localhost:8081}
  notifications-topic: ${BANK_NOTIFICATIONS_TOPIC:notifications}

resilience4j:
  circuitbreaker:
    instances:
      accounts:
        sliding-window-type: count_based
        sliding-window-size: 8
        minimum-number-of-calls: 4
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 2
        ignore-exceptions:
          - ru.yandex.practicum.mybank.common.AccountsServiceException

logging:
  level:
    org.springframework.security: INFO
    io.github.resilience4j: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

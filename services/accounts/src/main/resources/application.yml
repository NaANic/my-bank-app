spring:
  application:
    name: accounts

  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:bank}
    username: ${PG_USER:bank}
    password: ${PG_PASSWORD:bank}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: accounts
        format_sql: false

  flyway:
    enabled: true
    schemas: accounts
    default-schema: accounts
    create-schemas: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER_URI:http://localhost:8090/realms/bank}
          jwk-set-uri: ${OAUTH_JWK_SET_URI:http://localhost:8090/realms/bank/protocol/openid-connect/certs}

bank:
  notifications-topic: ${BANK_NOTIFICATIONS_TOPIC:notifications}
  outbox:
    poll-interval-ms: 5000

server:
  port: 8081

logging:
  level:
    org.springframework.security: INFO
    org.apache.kafka: WARN
    ru.yandex.practicum.mybank.accounts: INFO
